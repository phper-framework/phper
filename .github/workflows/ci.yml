name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches: [ "**" ]

env:
  RUST_LOG: debug
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"
  LLVM_CONFIG_PATH: llvm-config-18

jobs:
  required:
    name: Required
    needs:
      - ci
    runs-on: ubuntu-24.04
    steps:
      - name: Check results
        run: |
          [[ ${{ needs.ci.result }} == 'success' ]] || exit 1;

  ci:
    name: CI
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu - all PHP versions
          - { os: ubuntu-24.04, php-version: "7.0", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "7.1", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "7.2", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "7.3", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "7.4", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "8.0", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "8.1", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "8.2", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "8.3", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "8.4", ts: false, debug: false }
          - { os: ubuntu-24.04, php-version: "8.5", ts: false, debug: false }
          # Ubuntu - ZTS smoke matrix
          - { os: ubuntu-24.04, php-version: "8.5", ts: true, debug: false }
          # Ubuntu - debug smoke matrix
          - { os: ubuntu-24.04, php-version: "8.5", ts: false, debug: true }
          # macOS - PHP 8.1+
          - { os: macos-14, php-version: "8.1", ts: false, debug: false }
          - { os: macos-14, php-version: "8.2", ts: false, debug: false }
          - { os: macos-14, php-version: "8.3", ts: false, debug: false }
          - { os: macos-14, php-version: "8.4", ts: false, debug: false }
          - { os: macos-14, php-version: "8.5", ts: false, debug: false }

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libclang for Linux
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libclang-18-dev

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: php-config
        env:
          phpts: ${{ matrix.ts == true && 'ts' || 'nts' }}
          debug: ${{ matrix.debug == true && 'true' || 'false' }}

      - name: PHP version
        run: |
          echo "=== php path ===" && which php
          echo "=== php --version ===" && php --version
          echo "=== php-config path ===" && which php-config
          echo "=== php-config --version ===" && php-config --version
          echo "=== php-fpm path ===" && which php-fpm
          echo "=== php-fpm --version ===" && php-fpm --version

          [[ `php --version` == PHP\ ${{ matrix.php-version }}.* ]] || exit 1;
          [[ `php-config --version` == ${{ matrix.php-version }}.* ]] || exit 1;
          [[ `php-fpm --version` == PHP\ ${{ matrix.php-version }}.* ]] || exit 1;

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.os }}-ci-${{ matrix.php-version }}-ts-${{ matrix.ts }}-debug-${{ matrix.debug }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo fmt
        run: cargo +nightly fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --release

      - name: Cargo test
        run: cargo test --release -- --nocapture

      - name: Cargo doc
        run: cargo +nightly doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings --cfg docsrs"
